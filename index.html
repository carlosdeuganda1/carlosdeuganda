<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carlosdeuganda · Web Developer</title>
  <!-- Font Awesome Icons (CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Google Font (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <style>
    /* Reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(145deg, #f8faff 0%, #eef2f9 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #root {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    /* card / container style */
    .home-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 25px 45px -12px rgba(0, 10, 30, 0.2),
                  inset 0 1px 1px rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.4);
      transition: all 0.2s ease;
    }
    @media (max-width: 640px) {
      .home-card {
        padding: 1.8rem 1.2rem;
        border-radius: 2rem;
      }
    }
    /* react will mount here */
  </style>
</head>
<body>
  <!-- React root element -->
  <div id="root"></div>

  <!-- Load React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Our React App -->
  <script>
    // Destructure for convenience
    const { useState, useEffect } = React;

    // ----- MAIN APP COMPONENT -----
    const App = () => {
      // State for greeting animation (just for fun)
      const [greetingIndex, setGreetingIndex] = useState(0);
      const greetings = ['👋 Hola', '👋 Hello', '👋 Bonjour', '👋 你好'];

      useEffect(() => {
        const interval = setInterval(() => {
          setGreetingIndex((prev) => (prev + 1) % greetings.length);
        }, 3000);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="home-card">
          {/* header / identity */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', marginBottom: '2rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap' }}>
              <h1 style={{ fontSize: '2.8rem', fontWeight: 800, letterSpacing: '-0.02em', background: 'linear-gradient(135deg, #0b1e3a, #1d3b66)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>
                Carlosdeuganda
              </h1>
              <span style={{ background: '#0b1e3a', color: 'white', padding: '0.5rem 1.2rem', borderRadius: '40px', fontSize: '0.9rem', fontWeight: 600, letterSpacing: '0.3px', boxShadow: '0 6px 14px rgba(11,30,58,0.15)' }}>
                <i className="fas fa-code" style={{ marginRight: '8px' }}></i> web developer
              </span>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', flexWrap: 'wrap' }}>
              <span style={{ fontSize: '1.6rem', lineHeight: 1 }}>{greetings[greetingIndex]}</span>
              <span style={{ fontSize: '1.2rem', fontWeight: 400, color: '#1f3a5f' }}>— crafting digital experiences</span>
            </div>
          </div>

          {/* tagline / bio */}
          <div style={{ 
            background: 'rgba(11,30,58,0.03)', 
            padding: '1.2rem 1.8rem', 
            borderRadius: '1.8rem', 
            marginBottom: '2.5rem',
            border: '1px solid rgba(11,30,58,0.06)'
          }}>
            <p style={{ fontSize: '1.15rem', fontWeight: 400, color: '#1f3a5f', display: 'flex', alignItems: 'center', gap: '0.5rem', flexWrap: 'wrap' }}>
              <i className="fas fa-terminal" style={{ color: '#1d3b66', opacity: 0.7 }}></i>
              <span>Frontend · React · UI/UX ·  <span style={{ fontWeight: 600, background: '#d9e2ef', padding: '0.15rem 0.8rem', borderRadius: '30px', fontSize: '0.9rem' }}>#buildwithpassion</span></span>
            </p>
          </div>

          {/* featured projects / skills grid */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1.5rem', marginBottom: '2.8rem' }}>
            <div style={{ background: 'white', borderRadius: '1.5rem', padding: '1.5rem 1.2rem', boxShadow: '0 6px 18px rgba(0,0,0,0.02)', border: '1px solid rgba(255,255,255,0.6)' }}>
              <i className="fas fa-layer-group" style={{ fontSize: '2rem', color: '#1d3b66', marginBottom: '0.6rem' }}></i>
              <h3 style={{ fontSize: '1.1rem', fontWeight: 700, color: '#0b1e3a' }}>Modern UI</h3>
              <p style={{ fontSize: '0.9rem', color: '#2d4a6e', marginTop: '0.3rem' }}>Clean, responsive, accessible</p>
            </div>
            <div style={{ background: 'white', borderRadius: '1.5rem', padding: '1.5rem 1.2rem', boxShadow: '0 6px 18px rgba(0,0,0,0.02)', border: '1px solid rgba(255,255,255,0.6)' }}>
              <i className="fas fa-mobile-alt" style={{ fontSize: '2rem', color: '#1d3b66', marginBottom: '0.6rem' }}></i>
              <h3 style={{ fontSize: '1.1rem', fontWeight: 700, color: '#0b1e3a' }}>Mobile-first</h3>
              <p style={{ fontSize: '0.9rem', color: '#2d4a6e', marginTop: '0.3rem' }}>Pixel-perfect on any device</p>
            </div>
            <div style={{ background: 'white', borderRadius: '1.5rem', padding: '1.5rem 1.2rem', boxShadow: '0 6px 18px rgba(0,0,0,0.02)', border: '1px solid rgba(255,255,255,0.6)' }}>
              <i className="fas fa-rocket" style={{ fontSize: '2rem', color: '#1d3b66', marginBottom: '0.6rem' }}></i>
              <h3 style={{ fontSize: '1.1rem', fontWeight: 700, color: '#0b1e3a' }}>Performance</h3>
              <p style={{ fontSize: '0.9rem', color: '#2d4a6e', marginTop: '0.3rem' }}>Lightning fast interactions</p>
            </div>
          </div>

          {/* social & contact + CTA */}
          <div style={{ 
            display: 'flex', 
            flexWrap: 'wrap', 
            alignItems: 'center', 
            justifyContent: 'space-between',
            gap: '1.5rem',
            paddingTop: '1rem',
            borderTop: '1px solid rgba(11,30,58,0.08)'
          }}>
            <div style={{ display: 'flex', gap: '1.2rem', flexWrap: 'wrap' }}>
              <a href="#" style={{ color: '#1d3b66', fontSize: '1.5rem', transition: 'all 0.2s', background: 'rgba(11,30,58,0.04)', padding: '0.6rem 0.9rem', borderRadius: '40px', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '0.5rem' }}>
                <i className="fab fa-github"></i> <span style={{ fontSize: '0.9rem', fontWeight: 500 }}>github</span>
              </a>
              <a href="#" style={{ color: '#1d3b66', fontSize: '1.5rem', transition: 'all 0.2s', background: 'rgba(11,30,58,0.04)', padding: '0.6rem 0.9rem', borderRadius: '40px', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '0.5rem' }}>
                <i className="fab fa-linkedin-in"></i> <span style={{ fontSize: '0.9rem', fontWeight: 500 }}>linkedin</span>
              </a>
              <a href="#" style={{ color: '#1d3b66', fontSize: '1.5rem', transition: 'all 0.2s', background: 'rgba(11,30,58,0.04)', padding: '0.6rem 0.9rem', borderRadius: '40px', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: '0.5rem' }}>
                <i className="fab fa-twitter"></i> <span style={{ fontSize: '0.9rem', fontWeight: 500 }}>twitter</span>
              </a>
            </div>
            <div>
              <a href="#" style={{ 
                background: '#0b1e3a', 
                color: 'white', 
                padding: '0.75rem 2.2rem', 
                borderRadius: '60px', 
                textDecoration: 'none', 
                fontWeight: 600, 
                fontSize: '1rem',
                display: 'inline-flex',
                alignItems: 'center',
                gap: '0.6rem',
                boxShadow: '0 10px 20px -6px rgba(11,30,58,0.25)',
                transition: 'all 0.15s ease'
              }}
              onMouseEnter={(e) => { e.target.style.transform = 'scale(1.02)'; e.target.style.boxShadow = '0 14px 28px -8px rgba(11,30,58,0.3)'; }}
              onMouseLeave={(e) => { e.target.style.transform = 'scale(1)'; e.target.style.boxShadow = '0 10px 20px -6px rgba(11,30,58,0.25)'; }}
              >
                <i className="fas fa-paper-plane"></i> let's talk
              </a>
            </div>
          </div>

          {/* footer micro */}
          <div style={{ marginTop: '2.2rem', fontSize: '0.8rem', color: '#4a5f7a', display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: '0.5rem', opacity: 0.7 }}>
            <span><i className="far fa-copyright"></i> 2026 Carlosdeuganda · built with React</span>
            <span><i className="fas fa-location-dot"></i> Kampala · remote</span>
          </div>
        </div>
      );
    };

    // ----- MOUNT REACT APP -----
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
  </html>
